name: Build and Push Docker Images

on:
  push:
    branches:
      - main

jobs:
  docker:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      # Bonus: Scan repository for secrets
      - name: Scan repository for secrets
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # Login to Docker Hub
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      # Build Backend Image
      - name: Build Backend
        run: docker build -t ${{ secrets.DOCKER_USERNAME }}/dental-clinic:backend ./backend

      # Push Backend Image
      - name: Push Backend
        run: docker push ${{ secrets.DOCKER_USERNAME }}/dental-clinic:backend

      # Build Frontend Image
      - name: Build Frontend
        run: docker build -t ${{ secrets.DOCKER_USERNAME }}/dental-clinic:frontend ./frontend

      # Push Frontend Image
      - name: Push Frontend
        run: docker push ${{ secrets.DOCKER_USERNAME }}/dental-clinic:frontend
